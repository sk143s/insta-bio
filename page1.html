<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome 💖</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ffdde1, #ee9ca7); overflow: hidden; }
        .container { background: rgba(255, 255, 255, 0.9); padding: 40px; width: 90%; max-width: 400px; border-radius: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 4px solid #fff; }
        h1 { color: #ff6f91; margin-bottom: 10px; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.05); }
        p { margin-bottom: 20px; font-size: 18px; color: #666; }
        .math-box { background: #fff0f3; padding: 15px; border-radius: 15px; font-size: 24px; font-weight: bold; color: #ff3f6c; margin-bottom: 20px; border: 2px dashed #ffb1c1; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ffccd5; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff6f91; box-shadow: 0 0 10px rgba(255, 111, 145, 0.2); }
        button { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #ff6f91; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 111, 145, 0.3); }
        button:hover { background: #ff3f6c; transform: translateY(-2px); }
        .error { color: #ff3f6c; margin-top: 10px; font-weight: 500; min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome 💖</h1>
        <p>Solve this 3-digit teaser to enter...</p>
        <div class="math-box" id="equation">Generating...</div>
        <input type="number" id="answer" placeholder="Sum of numbers..." inputmode="numeric">
        <button onclick="checkAnswer()">Unlock Next Page ✨</button>
        <div class="error" id="errorMsg"></div>
    </div>

    <script>
        let correctAnswer;

        function generateProblem() {
            // Generates three random 3-digit numbers (between 100 and 999)
            const num1 = Math.floor(Math.random() * 900) + 100; 
            const num2 = Math.floor(Math.random() * 900) + 100;
            const num3 = Math.floor(Math.random() * 900) + 100;
            
            correctAnswer = num1 + num2 + num3;
            document.getElementById("equation").innerText = `${num1} + ${num2} + ${num3}`;
        }

        // Initialize on load
        generateProblem();

        function checkAnswer() {
            const val = document.getElementById("answer").value;
            const error = document.getElementById("errorMsg");

            if (parseInt(val) === correctAnswer) {
                // Fresh link for Netlify to avoid "Page Not Found"
                const nextLink = "puzzle2.html?v=" + Date.now();
                window.location.replace(nextLink);
            } else {
                error.innerText = "Wrong! Try again 💕";
                document.getElementById("answer").value = "";
                // Change the numbers so they can't just try again with the same sum
                generateProblem(); 
            }
        }

        // Heart Click Effect
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 6; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '💖';
                heart.style.position = 'fixed';
                heart.style.left = e.clientX + 'px';
                heart.style.top = e.clientY + 'px';
                heart.style.fontSize = '20px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '9999';
                heart.style.transition = 'all 1s ease-out';
                document.body.appendChild(heart);
                const dx = (Math.random() - 0.5) * 200;
                const dy = (Math.random() - 0.5) * 200;
                requestAnimationFrame(() => {
                    heart.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                });
                setTimeout(() => heart.remove(), 1000);
            }
        });
        
        window.addEventListener("pageshow", function (event) {
            if (event.persisted) window.location.reload();
        });
    </script>
</body>
</html>
