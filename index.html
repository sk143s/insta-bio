<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter and Continue 💖</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ffdde1, #ee9ca7); overflow: hidden; }
        .container { background: rgba(255, 255, 255, 0.9); padding: 40px; width: 90%; max-width: 400px; border-radius: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 4px solid #fff; }
        h1 { color: #ff6f91; margin-bottom: 25px; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.05); }
        img { border-radius: 15px; box-shadow: 0 5px 15px rgba(255, 111, 145, 0.2); }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ffccd5; font-size: 20px; text-align: center; margin-bottom: 5px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff6f91; box-shadow: 0 0 10px rgba(255, 111, 145, 0.2); }
        button { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #ff6f91; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 111, 145, 0.3); margin-top: 10px; }
        button:hover { background: #ff3f6c; transform: translateY(-2px); }
        .error { color: #ff3f6c; font-weight: 500; font-size: 16px; min-height: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome 💖</h1>
        <img src="sk.png" width="130px" alt="Image">
        <br><br>
        <p style="color:#ff3f6c;margin-bottom:10px;font-weight:bold;font-size:18px;">Enter Your Name</p>

        <input type="text" id="userInput" placeholder="Enter here..." autocomplete="off" oninput="clearError()">
        <div class="error" id="errorMsg"></div>

        <button onclick="continueToNext()">Continue ✨</button>
    </div>

    <script>
        function continueToNext() {
            const inputVal = document.getElementById("userInput").value.trim();
            const errorElement = document.getElementById("errorMsg");

            if (inputVal === "") {
                errorElement.innerText = "Please enter your name! 💕";
                return;
            }

            // ✅ ADDED: store name
            localStorage.setItem("username", inputVal);

            const nextLink = "page1.html?v=" + Date.now();
            window.location.replace(nextLink);
        }

        function clearError() {
            document.getElementById("errorMsg").innerText = "";
        }

        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            for (let i = 0; i < 6; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '💖';
                heart.style.position = 'fixed';
                heart.style.left = e.clientX + 'px';
                heart.style.top = e.clientY + 'px';
                heart.style.fontSize = '20px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '9999';
                heart.style.transition = 'all 1s ease-out';
                document.body.appendChild(heart);

                const dx = (Math.random() - 0.5) * 200;
                const dy = (Math.random() - 0.5) * 200;

                requestAnimationFrame(() => {
                    heart.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                });
                setTimeout(() => heart.remove(), 1000);
            }
        });

        window.addEventListener("pageshow", function (event) {
            if (event.persisted) window.location.reload();
        });
    </script>
</body>
</html>
